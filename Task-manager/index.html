<!DOCTYPE html>
<html>
<head>
  <title>Smart Study Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Smart Study Dashboard</h1>

<div class="container">

  <!-- Mood -->
  <div class="card">
    <h2>Mood</h2>
    <button onclick="setMood('happy')">😄</button>
    <button onclick="setMood('sad')">😔</button>
    <button onclick="setMood('stressed')">😣</button>
    <p id="suggestion"></p>
  </div>

  <!-- Task -->
  <div class="card">
    <h2>Tasks</h2>
    <input type="text" id="taskInput" placeholder="New task">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>

  <!-- Timer -->
  <div class="card">
    <h2>Focus Timer</h2>
    <p id="timer">25:00</p>
    <button onclick="startTimer()">Start</button>
  </div>

  <!-- Dark Mode -->
  <div class="card">
    <h2>Theme</h2>
    <button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
